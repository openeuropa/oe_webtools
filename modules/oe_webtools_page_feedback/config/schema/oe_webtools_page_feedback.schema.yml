oe_webtools_page_feedback.settings:
  type: config_object
  label: 'Webtools Page Feedback Form settings'
  mapping:
    enabled:
      type: boolean
      label: 'Enabled'
      description: 'Whether the Page Feedback Form is enabled or not.'
    feedback_form_id:
      type: string
      label: 'Form ID'
      description: 'ID of the corresponding Feedback Form where submissions will be recorded.'
    survey:
      type: uri
      label: 'Survey URL'
      description: 'Optional URL to the website survey. May contain the {zz} token as a language placeholder.'
